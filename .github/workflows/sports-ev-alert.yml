name: Sports EV Trigger Alerts

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required secrets
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          missing=0
          for name in ODDS_API_KEY ALERT_EMAIL_FROM ALERT_EMAIL_TO GMAIL_APP_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing required secret::$name is not configured in this repository"
              missing=1
            fi
          done
          exit "$missing"

      - name: Restore alert cooldown state
        uses: actions/cache/restore@v4
        with:
          path: alert_state.json
          key: sports-alert-state-${{ github.run_id }}
          restore-keys: |
            sports-alert-state-

      - name: Run sports EV alert scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REGIONS: au
          ODDS_MARKETS: h2h
          WATCHED_SPORTS: aussierules_afl,basketball_nba,soccer_epl,cricket_ipl,cricket_big_bash,cricket_international_t20
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_COOLDOWN_HOURS: "24"
          SEND_EMPTY_REPORT: "true"
          EMPTY_REPORT_COOLDOWN_HOURS: "6"
          DRY_RUN: "false"
        run: |
          python -m pip install -e .
          python -m evbetting_agent --live --include-scores --scores-days 3 --send-email --state alert_state.json --dashboard-json docs/data/latest.json

      - name: Commit dashboard data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/data/latest.json; then
            echo "No dashboard data changes to commit."
          else
            git add docs/data/latest.json
            git commit -m "Update sports EV dashboard data"
            git push
          fi

      - name: Save alert cooldown state
        if: always()
        run: test -f alert_state.json || echo '{}' > alert_state.json

      - name: Save alert cooldown cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: alert_state.json
          key: sports-alert-state-${{ github.run_id }}
